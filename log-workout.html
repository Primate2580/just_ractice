<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTrack Pro - Log Workout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <h1 class="text-xl font-black tracking-tight text-slate-900">FITTRACK <span class="text-indigo-600">PRO</span></h1>
      <nav class="flex gap-4">
        <a href="index.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition">Dashboard</a>
        <a href="log-workout.html" class="text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1">Log Workout</a>
      </nav>
    </div>
  </header>

  <main class="max-w-xl mx-auto px-4 py-12">
    <div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
      <h2 class="text-2xl font-extrabold tracking-tight mb-2">Log New Workout</h2>
      <p class="text-slate-500 text-sm mb-6">Track your effort to maintain consistency over time.</p>

      <form id="workout-form" class="space-y-5">
        
        <div>
          <label for="exercise-name" class="block text-xs font-bold uppercase tracking-wider text-slate-700 mb-2">Exercise Name</label>
          <input type="text" id="exercise-name" placeholder="e.g., Treadmill Run, Bench Press" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500 transition">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="workout-category" class="block text-xs font-bold uppercase tracking-wider text-slate-700 mb-2">Category</label>
            <select id="workout-category" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500 transition">
              <option value="">Select Category</option>
              <option value="Cardio">Cardio</option>
              <option value="Strength">Strength Training</option>
              <option value="Flexibility">Flexibility / Yoga</option>
              <option value="HIIT">HIIT</option>
            </select>
          </div>

          <div>
            <label for="workout-duration" class="block text-xs font-bold uppercase tracking-wider text-slate-700 mb-2">Duration (Minutes)</label>
            <input type="number" id="workout-duration" placeholder="e.g., 45" min="1" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500 transition">
          </div>
        </div>

        <div>
          <label for="workout-date" class="block text-xs font-bold uppercase tracking-wider text-slate-700 mb-2">Date</label>
          <input type="date" id="workout-date" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500 transition">
        </div>

        <div class="pt-4 flex gap-3">
          <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm transition shadow-sm">
            Save Workout
          </button>
          <a href="index.html" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 px-4 rounded-lg text-sm transition text-center">
            Cancel
          </a>
        </div>

      </form>
    </div>
  </main>

  <script src="js/form.js"></script>
</body>
</html>
