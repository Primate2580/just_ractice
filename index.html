<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitTrack Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
      <div
        class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between"
      >
        <h1 class="text-xl font-black tracking-tight text-slate-900">
          FITTRACK <span class="text-indigo-600">PRO</span>
        </h1>
        <nav class="flex gap-4">
          <a
            href="index.html"
            class="text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1"
            >Dashboard</a
          >
          <a
            href="log-workout.html"
            class="text-sm font-medium text-slate-600 hover:text-slate-900 transition"
            >Log Workout</a
          >
        </nav>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
      <div
        class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8"
      >
        <div>
          <h2 class="text-3xl font-extrabold tracking-tight">Welcome Back!</h2>
          <p class="text-slate-500 mt-1">
            Here is your fitness breakdown for this month.
          </p>
        </div>
        <a
          href="log-workout.html"
          class="inline-flex items-center justify-center px-5 py-2.5 text-sm font-bold text-white bg-slate-900 hover:bg-slate-800 rounded-lg transition shadow-sm"
        >
          + Log New Workout
        </a>
      </div>

      <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
          <p
            class="text-sm font-medium text-slate-500 uppercase tracking-wider"
          >
            Total Active Time
          </p>
          <p id="total-minutes" class="text-4xl font-black text-slate-900 mt-2">
            0 mins
          </p>
        </div>
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
          <p
            class="text-sm font-medium text-slate-500 uppercase tracking-wider"
          >
            Workouts Logged
          </p>
          <p id="total-count" class="text-4xl font-black text-slate-900 mt-2">
            0
          </p>
        </div>
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
          <p
            class="text-sm font-medium text-slate-500 uppercase tracking-wider"
          >
            Primary Focus
          </p>
          <p id="top-category" class="text-4xl font-black text-indigo-600 mt-2">
            —
          </p>
        </div>
      </section>

      <section
        class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-4"
      >
        <h3 class="text-lg font-bold text-slate-900">Workout History</h3>
        <div class="flex items-center gap-2">
          <button
            id="sort-date-btn"
            class="px-3 py-1.5 text-xs font-bold uppercase tracking-wider border border-slate-300 rounded hover:bg-slate-100 transition flex items-center gap-1"
          >
            Sort by Date <span id="sort-direction">▼</span>
          </button>
        </div>
      </section>

      <section
        class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-200">
                <th
                  class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500"
                >
                  Date
                </th>
                <th
                  class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500"
                >
                  Exercise
                </th>
                <th
                  class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500"
                >
                  Category
                </th>
                <th
                  class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500"
                >
                  Duration
                </th>
                <th
                  class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500 text-right"
                >
                  Actions
                </th>
              </tr>
            </thead>
            <tbody id="workout-rows" class="divide-y divide-slate-100">
              <tr>
                <td
                  colspan="5"
                  class="p-8 text-center text-sm text-slate-400 italic"
                >
                  No workouts logged yet. Time to hit the gym!
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="js/dashboard.js"></script>
  </body>
</html>
